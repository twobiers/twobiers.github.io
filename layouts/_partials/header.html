<header class="site-header">
    <div class="container header-inner">
        <div class="header-branding">
            <a href="/" class="header-logo">{{ .Site.Title }}</a>
        </div>
        <nav class="header-nav">
            <ul class="header-menu">
                {{ range .Site.Menus.main }}
                <li>
                    <a href="{{ .URL }}" class="header-menu-link{{ if $node := $.Site.Home.OutputFormats.Get "html"
                        }}{{ if eq $.RelPermalink $node.RelPermalink }} active{{ end }}{{ end }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
            </ul>
        </nav>
        <button id="theme-toggle" class="header-theme-toggle" aria-label="Toggle dark mode">
            <span class="theme-icon">🌙</span>
        </button>
    </div>
</header>
