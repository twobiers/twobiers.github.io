<div class="article-meta">
    <time datetime="{{ .Date.Format " 2006-01-02T15:04:05Z07:00" }}" class="article-date">
        {{ .Date.Format "January 2, 2006" }}
    </time>
    {{ if .ReadingTime }}
    <span class="article-reading-time">{{ .ReadingTime }} min read</span>
    {{ end }}
    {{ with .Params.tags }}
    <div class="article-tags">
        {{ range . }}
        <a href="/tags/{{ . | urlize }}" class="tag-link">#{{ . }}</a>
        {{ end }}
    </div>
    {{ end }}
    {{ $aiAssisted := .Params.ai_assisted | default false }}
    {{ if $aiAssisted }}
    <span class="ai-disclosure-badge" title="Written with AI assistance, carefully reviewed">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm-1-5h2v2h-2zm0-8h2v6h-2z"/>
        </svg>
        AI-assisted
    </span>
    {{ else }}
    <span class="ai-disclosure-badge" title="Written entirely by the author">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
        Human-written
    </span>
    {{ end }}
</div>

<style>
    .article-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(var(--color-neutral-200), 1);
        color: rgba(var(--color-neutral-600), 1);
        font-size: 0.875rem;
    }

    [data-theme="dark"] .article-meta {
        border-bottom-color: rgba(var(--color-neutral-700), 1);
        color: rgba(var(--color-neutral-400), 1);
    }

    .article-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .tag-link {
        color: rgba(var(--color-primary-600), 1);
    }

    [data-theme="dark"] .tag-link {
        color: rgba(var(--color-primary-400), 1);
    }
</style>
